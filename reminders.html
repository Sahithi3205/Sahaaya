 <!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Reminders - Sahaaya</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="feature-page">

<h1 id="remindersTitle">⏰ Smart Reminders</h1>

<div class="form-box">

<input type="text" id="reminderText" placeholder="Enter reminder" required>

<input type="time" id="reminderTime" required>

<button type="button" onclick="addReminder()" id="addReminderBtn">
Add Reminder
</button>

</div>

<h2>Reminder List</h2>

<table id="medicineTable">

<thead>
<tr>
<th>Reminder</th>
<th>Time</th>
<th>Action</th>
</tr>
</thead>

<tbody id="reminderList">
<tr>
<td colspan="3">No reminders added yet</td>
</tr>
</tbody>

</table>



<div class="bottom-home">
<button onclick="window.location.href='index.html'">
⬅ Back to Home
</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
