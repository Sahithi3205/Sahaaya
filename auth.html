<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sahaaya Login</title>
<link rel="stylesheet" href="style.css">

<style>
.auth-box {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: center;
    width: 350px;
}

.auth-box input, .auth-box select {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}

.auth-box button {
    padding: 10px 20px;
    background: #b08d57;
    border: none;
    color: white;
    cursor: pointer;
}

.toggle-btn {
    margin: 10px;
    cursor: pointer;
    color: #8c6b3c;
}
</style>

</head>

<body>

<div class="feature-page">

    <div class="auth-box">

        <h1 id="authTitle">Login</h1>

        <!-- LOGIN -->
        <div id="loginBox">

            <input type="text" id="loginPhone" placeholder="Phone Number">
            <input type="password" id="loginPin" placeholder="4-digit PIN">

            <button onclick="login()">Login</button>

            <p class="toggle-btn" onclick="showSignup()">New user? Sign Up</p>
        </div>

        <!-- SIGNUP -->
        <div id="signupBox" style="display:none;">

            <input type="text" id="name" placeholder="Full Name">
            <input type="text" id="phone" placeholder="Phone Number">
            <input type="password" id="pin" placeholder="4-digit PIN">

            <select id="role">
                <option value="senior">Senior Citizen</option>
                <option value="caregiver">Caregiver</option>
            </select>

            <button onclick="signup()">Create Account</button>

            <p class="toggle-btn" onclick="showLogin()">Already have account? Login</p>
        </div>

    </div>

</div>

<script src="script.js"></script>

<script>
function showSignup() {
    document.getElementById("signupBox").style.display = "block";
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("authTitle").innerText = "Sign Up";
}

function showLogin() {
    document.getElementById("signupBox").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
    document.getElementById("authTitle").innerText = "Login";
}
</script>

</body>
</html>
