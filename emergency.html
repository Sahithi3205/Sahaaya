<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Emergency SOS - Sahaaya</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="feature-page">

<h1 id="emergencyPageTitle">Emergency SOS</h1>

<div id="sosBox" class="sos-container">

<p class="sos-info">
Press the SOS button only during an emergency.
It will notify caregivers immediately.
</p>

<button class="big-sos" onclick="confirmSOS()" id="sosButton">
🚑 SOS
</button>

<p id="sosStatus"></p>

<div class="emergency-contacts">

<h3>Emergency Contacts</h3>

<input type="text" id="contactName" placeholder="Contact Name">

<input type="tel" id="contactPhone" placeholder="Phone Number">

<button onclick="addContact()" class="add-contact-btn">
Add Contact
</button>

<ul id="contactList"></ul>

<p class="ambulance">🚑 Ambulance: 108</p>

</div>

</div>

<div class="bottom-home">
<button onclick="window.location.href='index.html'">
⬅ Back to Home
</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
